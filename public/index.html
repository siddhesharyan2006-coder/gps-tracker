<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GPS Tracking Dashboard</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="topbar">
    <h1>GPS Tracking Dashboard</h1>
    <p>Real-time vehicle monitoring interface</p>
  </header>

  <main class="container">
    <section class="map-section">
      <div class="map-card">
        <h2>Map View</h2>
        <div class="map-placeholder">
          <span>Live Map Area</span>
        </div>
      </div>
    </section>

    <section class="sidebar">
      <div class="card">
        <h2>Tracked Vehicles</h2>
        <div id="vehicle-list"></div>
      </div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
